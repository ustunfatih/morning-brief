name: Generate Morning Brief

on:
  push:
    branches:
      - main
    paths-ignore:
      - index.html
      - assets/headers/**
  schedule:
    # GitHub cron uses UTC. 04:00 UTC = 07:00 Asia/Qatar (UTC+3).
    - cron: '0 4 * * *'
  workflow_dispatch: # Manual trigger

concurrency:
  group: generate-morning-brief-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    if: ${{ github.event_name != 'push' || github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Qatar

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Generator
        # İŞTE EKSİK OLAN KÖPRÜ BURASI 👇
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
          EMAIL_RENDER_MODE: ${{ vars.EMAIL_RENDER_MODE }}
          THEME_PROFILE: ${{ vars.THEME_PROFILE }}
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          TODOIST_FILTER: ${{ vars.TODOIST_FILTER }}
          TODOIST_MAX_ITEMS: ${{ vars.TODOIST_MAX_ITEMS }}
          TODOIST_CACHE_TTL_MIN: ${{ vars.TODOIST_CACHE_TTL_MIN }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python morning_brief_engine.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'Morning Brief Bot'
          git config --global user.email 'bot@noreply.github.com'
          git add index.html
          if [ -d assets/headers ]; then
            git add -A assets/headers
          fi
          git commit -m "Daily Brief Update: $(date) [skip ci]" || exit 0
          git pull --rebase origin main
          git push
